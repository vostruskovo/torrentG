        function sanitizeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function sanitizeAttribute(str) {
            if (!str) return '';
            return String(str).replace(/["'<>&]/g, function(match) {
                switch (match) {
                    case '"': return '&quot;';
                    case "'": return '&#x27;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '&': return '&amp;';
                    default: return match;
                }
            });
        }

        // ----- NORMALIZE SIZE FORMAT (GiB → GB, MiB → MB) -----
        function normalizeSize(size) {
            if (!size) return 'unknown';
            
            // Convert GiB to GB
            let normalized = size.replace(/\s*GiB\s*/gi, 'GB');
            // Convert MiB to MB
            normalized = normalized.replace(/\s*MiB\s*/gi, 'MB');
            // Convert TiB to TB (just in case)
            normalized = normalized.replace(/\s*TiB\s*/gi, 'TB');
            // Convert KiB to KB
            normalized = normalized.replace(/\s*KiB\s*/gi, 'KB');
            
            // Also handle "~" prefix
            normalized = normalized.replace(/^~\s*/, '~');
            
            // Ensure consistent spacing
            normalized = normalized.replace(/(\d)\s*(GB|MB|TB|KB|G|M|T|K)/gi, '$1 $2');
            
            return normalized.trim();

            // ===== METAL GEAR SOLID =====
            ["Metal Gear Solid 2 - PC", "magnet:?xt=urn:btih:4577E4087CBA11537B40260D48892F98B7E57C61&dn=Metal+Gear+Solid+2+-+PC", "3.71 GB", "pc"],
            
            // ===== DELTA FORCE SERIES (PC) =====
            ["Delta Force Black Hawk Down Full PC Game {Highly Compress}", "magnet:?xt=urn:btih:A05DE24C58626725378C993CDAD14865D52D3F4F&dn=Delta+Force+Black+Hawk+Down+Full+PC+Game+%7BHighly+Compress%7D", "293 MB", "pc"],
            ["Delta Force Black Hawk Down - PC - First person shooter Game", "magnet:?xt=urn:btih:3BC8089C549F76FF8B54CA39B66852DB3FD63767&dn=Delta+Force+Black+Hawk+Down+-+PC+-+First+person+shooter+Game", "514 MB", "pc"],
            ["[PC][CD] Delta Force - Black Hawk Down + Team Sabre [tlOd]", "magnet:?xt=urn:btih:089D00D0810CC61F0022E3B11E0A054D07C1F6F1&dn=%5BPC%5D%5BCD%5D+Delta+Force+-+Black+Hawk+Down+%2B+Team+Sabre+%5BtlOd%5D", "760 MB", "pc"],
            ["Delta Force Black Hawk Down PC", "magnet:?xt=urn:btih:A9707EA718A896BB8CA1115B026255BC3E7710D4&dn=Delta+Force+Black+Hawk+Down+PC", "674 MB", "pc"],
            
            // ===== GRAND THEFT AUTO SERIES (PC) =====
            ["GTA Vice City Modded Version PC", "magnet:?xt=urn:btih:509529500D77A537F90B761534EC9C90CA5667B2&dn=GTA+Vice+City+Modded+Version+PC", "1.34 GB", "pc"],
            ["GTA.San.Andreas.new.guns.new.gangs.new.clothes.2009[pc]", "magnet:?xt=urn:btih:1795B7DC27405FF9E1716C7127F0D19A2E48A6CB&dn=GTA.San.Andreas.new.guns.new.gangs.new.clothes.2009%5Bpc%5D", "4.73 GB", "pc"]
        ];

        // ----- DEDUPLICATION: by name (case-insensitive) -----
        const nameMap = new Map();

        for (const [name, magnet, size, platform] of rawData) {
            const nameLower = name.trim().toLowerCase();
            const normalizedSize = normalizeSize(size);
            const existing = nameMap.get(nameLower);
            
            if (!existing) {
                nameMap.set(nameLower, {
                    name: name.trim(),
                    magnet: magnet.trim(),
                    size: normalizedSize,
                    platform: platform || detectPlatform(name),
                    magnetLength: magnet.trim().length
                });
            } else {
                const currentMagnet = magnet.trim();
                if (currentMagnet.length > existing.magnetLength) {
                    nameMap.set(nameLower, {
                        name: name.trim(),
                        magnet: currentMagnet,
                        size: normalizedSize,
                        platform: platform || detectPlatform(name),
                        magnetLength: currentMagnet.length
                    });
                }
            }
        }

        const uniqueTorrents = Array.from(nameMap.values()).map(item => ({
            name: item.name,
            magnet: item.magnet,
            size: item.size,
            platform: item.platform
        }));

        // ----- SORT ALPHABETICALLY -----
        uniqueTorrents.sort((a, b) => {
            return a.name.localeCompare(b.name, 'en', { sensitivity: 'base' });
        });

        // ----- SMART SEARCH FUNCTION -----
        function smartSearch(query, list) {
            if (!query || query.trim() === '') {
                return list;
            }

            const q = query.toLowerCase().trim();
            const words = q.split(/\s+/);
            
            const scored = list.map(item => {
                const nameLower = item.name.toLowerCase();
                let score = 0;
                
                for (const word of words) {
                    if (nameLower.includes(word)) {
                        const index = nameLower.indexOf(word);
                        const wordLength = word.length;
                        const positionBonus = index === 0 ? 10 : 0;
                        const lengthBonus = wordLength * 0.5;
                        const boundaryBonus = nameLower.includes(' ' + word) || nameLower.startsWith(word + ' ') ? 3 : 0;
                        score += 1 + positionBonus + lengthBonus + boundaryBonus;
                    }
                }
                
                if (nameLower.includes(q)) {
                    score += 5;
                }
                
                return { item, score };
            });
            
            const matched = scored.filter(s => s.score > 0);
            
            matched.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.item.name.localeCompare(b.item.name, 'en', { sensitivity: 'base' });
            });
            
            return matched.map(s => s.item);
        }

        // ----- DOM References -----
        const container = document.getElementById('torrentContainer');
        const searchInput = document.getElementById('searchInput');
        const totalSpan = document.getElementById('totalCount');
        const uniqueCountSpan = document.getElementById('uniqueCount');
        const matchInfo = document.getElementById('matchInfo');
        const smartHint = document.getElementById('smartHint');

        let selectedIndex = -1;
        let currentFiltered = [];
        let currentPlatform = 'all';

        // ----- Copy Magnet Function -----
        function copyMagnet(magnet, btnElement) {
            if (!magnet) return;
            
            const cleanMagnet = String(magnet).trim();
            
            navigator.clipboard.writeText(cleanMagnet).then(() => {
                const original = btnElement.innerHTML;
                btnElement.innerHTML = '✅ Copied';
                btnElement.classList.add('copied');
                setTimeout(() => {
                    btnElement.innerHTML = original;
                    btnElement.classList.remove('copied');
                }, 2200);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = cleanMagnet;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const original = btnElement.innerHTML;
                btnElement.innerHTML = '✅ Copied';
                btnElement.classList.add('copied');
                setTimeout(() => {
                    btnElement.innerHTML = original;
                    btnElement.classList.remove('copied');
                }, 2200);
            });
        }

        // ----- Platform Filter -----
        function updatePlatformCounts() {
            const counts = {
                all: uniqueTorrents.length,
                pc: 0,
                wii: 0,
                wiiu: 0,
                xbox: 0,
                ps: 0
            };

            for (const t of uniqueTorrents) {
                if (t.platform in counts) {
                    counts[t.platform]++;
                } else {
                    counts.pc++;
                }
            }

            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countPC').textContent = counts.pc;
            document.getElementById('countWii').textContent = counts.wii;
            document.getElementById('countWiiU').textContent = counts.wiiu;
            document.getElementById('countXbox').textContent = counts.xbox || 0;
            document.getElementById('countPS').textContent = counts.ps || 0;
        }

        // ----- Render Function -----
        function render() {
            const query = searchInput.value;
            const platform = currentPlatform;
            
            // First filter by platform
            let filtered = uniqueTorrents;
            if (platform !== 'all') {
                filtered = filtered.filter(item => item.platform === platform);
            }
            
            // Then apply search
            filtered = smartSearch(query, filtered);

            currentFiltered = filtered;
            totalSpan.textContent = filtered.length;
            uniqueCountSpan.textContent = `${uniqueTorrents.length} unique`;

            if (query.trim()) {
                matchInfo.textContent = `🔍 Found ${filtered.length} matching torrents`;
                smartHint.textContent = `Smart matching: "${sanitizeHTML(query)}"`;
            } else {
                const platformNames = {
                    'all': 'All Platforms',
                    'pc': 'PC',
                    'wii': 'Wii',
                    'wiiu': 'Wii U',
                    'xbox': 'Xbox',
                    'ps': 'PlayStation'
                };
                matchInfo.textContent = `📚 ${filtered.length} torrents (${platformNames[platform] || 'All'})`;
                smartHint.textContent = 'Sorted alphabetically';
            }

            if (filtered.length === 0) {
                let suggestions = '';
                if (query.trim()) {
                    suggestions = `<div class="suggestions">💡 Try: different keywords or check spelling</div>`;
                }
                container.innerHTML = `<div class="empty-message">⚡ no torrents found · try a different search${suggestions}</div>`;
                selectedIndex = -1;
                return;
            }

            let html = '';
            for (let i = 0; i < filtered.length; i++) {
                const t = filtered[i];
                
                const cleanName = sanitizeHTML(t.name);
                const cleanMagnet = sanitizeHTML(t.magnet);
                const cleanSize = sanitizeHTML(t.size);
                const cleanMagnetAttr = sanitizeAttribute(t.magnet);
                const platformClass = t.platform || 'pc';
                
                let displayName = cleanName;
                if (query.trim()) {
                    const q = query.toLowerCase().trim();
                    const nameLower = t.name.toLowerCase();
                    let highlighted = '';
                    let lastIndex = 0;
                    for (const word of q.split(/\s+/)) {
                        const index = nameLower.indexOf(word, lastIndex);
                        if (index !== -1) {
                            highlighted += sanitizeHTML(t.name.substring(lastIndex, index));
                            highlighted += `<span class="match-highlight">${sanitizeHTML(t.name.substring(index, index + word.length))}</span>`;
                            lastIndex = index + word.length;
                        }
                    }
                    if (lastIndex < t.name.length) {
                        highlighted += sanitizeHTML(t.name.substring(lastIndex));
                    }
                    if (highlighted) {
                        displayName = highlighted;
                    }
                }
                
                const platformIcon = {
                    'pc': '💻',
                    'wii': '🎮',
                    'wiiu': '📺',
                    'xbox': '🟢',
                    'ps': '🔵'
                }[platformClass] || '💻';
                
                html += `
                    <div class="torrent-item" data-index="${i}" data-magnet="${cleanMagnetAttr}" data-platform="${platformClass}">
                        <span class="torrent-name" title="${cleanName}">${displayName}</span>
                        <span class="torrent-platform ${platformClass}">${platformIcon} ${platformClass}</span>
                        <span class="torrent-magnet" title="${cleanMagnet}">${cleanMagnet}</span>
                        <span class="torrent-size">${cleanSize}</span>
                        <button class="copy-btn" data-magnet="${cleanMagnetAttr}">📋 Copy</button>
                    </div>
                `;
            }
            container.innerHTML = html;

            // Click on entire torrent-item copies magnet
            document.querySelectorAll('.torrent-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.classList.contains('copy-btn')) return;
                    
                    const magnet = this.getAttribute('data-magnet');
                    if (!magnet) return;
                    
                    const btn = this.querySelector('.copy-btn');
                    if (btn) {
                        copyMagnet(magnet, btn);
                    } else {
                        navigator.clipboard.writeText(magnet).then(() => {
                            console.log('Copied magnet:', magnet);
                        });
                    }
                });
            });

            // Copy button click handlers
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const magnet = this.getAttribute('data-magnet');
                    if (!magnet) return;
                    copyMagnet(magnet, this);
                });
            });

            if (filtered.length > 0) {
                if (selectedIndex >= filtered.length) {
                    selectedIndex = filtered.length - 1;
                }
                if (selectedIndex === -1) {
                    selectedIndex = 0;
                }
            } else {
                selectedIndex = -1;
            }
            
            highlightSelected(filtered.length);
        }

        function highlightSelected(totalItems) {
            document.querySelectorAll('.torrent-item.keyboard-selected').forEach(el => {
                el.classList.remove('keyboard-selected');
            });
            
            if (selectedIndex < 0 || selectedIndex >= totalItems) {
                selectedIndex = -1;
                return;
            }
            
            const items = document.querySelectorAll('.torrent-item');
            if (items.length > 0 && selectedIndex < items.length) {
                const target = items[selectedIndex];
                target.classList.add('keyboard-selected');
                target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        function navigate(direction) {
            const visibleItems = document.querySelectorAll('.torrent-item');
            const total = visibleItems.length;
            
            if (total === 0) {
                selectedIndex = -1;
                return;
            }

            if (direction === 'down') {
                selectedIndex = (selectedIndex + 1) % total;
            } else if (direction === 'up') {
                selectedIndex = (selectedIndex - 1 + total) % total;
            }
            
            highlightSelected(total);
        }

        function copySelected() {
            if (selectedIndex === -1) return;
            const items = document.querySelectorAll('.torrent-item');
            if (selectedIndex >= items.length) return;
            const item = items[selectedIndex];
            const magnet = item.getAttribute('data-magnet');
            if (!magnet) return;
            const btn = item.querySelector('.copy-btn');
            if (btn) {
                copyMagnet(magnet, btn);
            }
        }

        // ----- Event Listeners -----
        searchInput.addEventListener('input', () => {
            selectedIndex = -1;
            render();
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                copySelected();
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                navigate('down');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                navigate('up');
            } else if (e.key === 'Escape') {
                e.preventDefault();
                searchInput.value = '';
                selectedIndex = -1;
                render();
                searchInput.blur();
            }
        });

        // Platform filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPlatform = this.dataset.platform;
                selectedIndex = -1;
                render();
            });
        });

        // Global keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            const isInputFocused = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');

            if (isInputFocused && active.id === 'searchInput') {
                return;
            }

            if (isInputFocused) {
                return;
            }

            switch (e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    navigate('down');
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    navigate('up');
                    break;
                case 'Enter':
                    e.preventDefault();
                    copySelected();
                    break;
                case '/':
                    if (!e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        searchInput.focus();
                        searchInput.select();
                    }
                    break;
                case 'Escape':
                    e.preventDefault();
                    selectedIndex = -1;
                    highlightSelected(document.querySelectorAll('.torrent-item').length);
                    searchInput.blur();
                    break;
                default:
                    break;
            }
        });

        // Initial render
        updatePlatformCounts();
        render();
        if (uniqueTorrents.length > 0) {
            selectedIndex = 0;
            highlightSelected(uniqueTorrents.length);
        }

        console.log(`🔍 TorrentG v4 ready · ${uniqueTorrents.length} unique torrents`);
        console.log('📏 All sizes normalized to GB/MB format');
        console.log('🎮 Platform filtering: PC, Wii, Wii U');
        console.log('💡 Click any torrent to copy magnet');
        console.log('⌨️ Arrow keys: navigate up/down, Enter: copy selected');
        console.log('🛡️ XSS Protection: All user input is sanitized');
    })();
</script>
