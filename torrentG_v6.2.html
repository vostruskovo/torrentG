        ["Need For Speed Shift PC", "magnet:?xt=urn:btih:7F8A9B0C1D2E3F4A5B6C7D8E9F0A1B2C3D4E5F&dn=Need+For+Speed+Shift+PC", "4.2 GiB", "pc"],
        ["Need For Speed Hot Pursuit 2010 PC", "magnet:?xt=urn:btih:8A9B0C1D2E3F4A5B6C7D8E9F0A1B2C3D4E5F6A&dn=Need+For+Speed+Hot+Pursuit+2010+PC", "3.8 GiB", "pc"],
        ["Need For Speed Rivals PC", "magnet:?xt=urn:btih:1D2E3F4A5B6C7D8E9F0A1B2C3D4E5F6A7B8C9D&dn=Need+For+Speed+Rivals+PC", "7.2 GiB", "pc"],
        ["GTA Vice City Modded Version PC", "magnet:?xt=urn:btih:509529500D77A537F90B761534EC9C90CA5667B2&dn=GTA+Vice+City+Modded+Version+PC", "1.34 GiB", "pc"],
        ["GTA.San.Andreas.new.guns.new.gangs.new.clothes.2009[pc]", "magnet:?xt=urn:btih:1795B7DC27405FF9E1716C7127F0D19A2E48A6CB&dn=GTA.San.Andreas.new.guns.new.gangs.new.clothes.2009%5Bpc%5D", "4.73 GiB", "pc"],
        ["Metal Gear Solid 2 - PC", "magnet:?xt=urn:btih:4577E4087CBA11537B40260D48892F98B7E57C61&dn=Metal+Gear+Solid+2+-+PC", "3.71 GiB", "pc"],
        ["Delta Force Black Hawk Down Full PC Game {Highly Compress}", "magnet:?xt=urn:btih:A05DE24C58626725378C993CDAD14865D52D3F4F&dn=Delta+Force+Black+Hawk+Down+Full+PC+Game+%7BHighly+Compress%7D", "293.48 MiB", "pc"],
        ["Delta Force Black Hawk Down PC", "magnet:?xt=urn:btih:A9707EA718A896BB8CA1115B026255BC3E7710D4&dn=Delta+Force+Black+Hawk+Down+PC", "673.96 MiB", "pc"]
    ];

    // ----- DEDUPE & BUILD -----
    const nameMap = new Map();
    for (const [name, magnet, size, platform] of rawData) {
        const key = name.trim().toLowerCase();
        if (!nameMap.has(key)) {
            nameMap.set(key, { name: name.trim(), magnet: magnet.trim(), size: size.trim(), platform: platform || 'pc' });
        }
    }
    let torrents = Array.from(nameMap.values());

    // ----- HELPERS -----
    function normalizeSize(size) {
        if (!size) return 'unknown';
        let s = size.replace(/\s*GiB/gi, 'GB').replace(/\s*MiB/gi, 'MB').replace(/\s*TiB/gi, 'TB').replace(/\s*KiB/gi, 'KB');
        return s.trim();
    }
    function extractInfoHash(magnet) {
        const match = magnet.match(/urn:btih:([a-fA-F0-9]{40})/);
        return match ? match[1] : 'N/A';
    }
    function parseSize(sizeStr) {
        const num = parseFloat(sizeStr);
        if (isNaN(num)) return 0;
        if (sizeStr.includes('GB')) return num * 1024;
        if (sizeStr.includes('MB')) return num;
        if (sizeStr.includes('TB')) return num * 1024 * 1024;
        if (sizeStr.includes('KB')) return num / 1024;
        return num;
    }

    // ----- STATE -----
    let favorites = new Set();
    let currentPlatform = 'all';
    let selectedIndex = -1;
    let currentFiltered = [];
    let sortKey = 'name';
    let showFavoritesOnly = false;

    // ----- DOM REFS -----
    const container = document.getElementById('torrentContainer');
    const searchInput = document.getElementById('searchInput');
    const totalSpan = document.getElementById('totalCount');
    const uniqueCountSpan = document.getElementById('uniqueCount');
    const favCountBadge = document.getElementById('favCountBadge');
    const favFilterBtn = document.getElementById('favFilterBtn');
    const modal = document.getElementById('modal');
    const modalTextarea = document.getElementById('modalTextarea');
    const modalTitle = document.getElementById('modalTitle');
    const modalConfirmBtn = document.getElementById('modalConfirmBtn');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    // ----- COPY HELPER (always selects/copies) -----
    function copyTextToClipboard(text, element) {
        if (!text) return;
        // 1. copy to clipboard
        navigator.clipboard.writeText(text).then(() => {
            // visual feedback on the element
            if (element) {
                const orig = element.textContent;
                element.textContent = '✅';
                element.classList.add('copied-hash');
                setTimeout(() => {
                    element.textContent = orig;
                    element.classList.remove('copied-hash');
                }, 1500);
            }
        }).catch(() => {
            // fallback: use textarea
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            if (element) {
                const orig = element.textContent;
                element.textContent = '✅';
                element.classList.add('copied-hash');
                setTimeout(() => {
                    element.textContent = orig;
                    element.classList.remove('copied-hash');
                }, 1500);
            }
        });

        // 2. also select the text for manual copy (user can Ctrl+C)
        if (element) {
            // select the content of the element
            const range = document.createRange();
            range.selectNodeContents(element);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
    }

    // ----- RENDER -----
    function render() {
        const query = searchInput.value.toLowerCase().trim();
        let filtered = torrents;
        if (currentPlatform !== 'all') filtered = filtered.filter(t => t.platform === currentPlatform);
        if (showFavoritesOnly) filtered = filtered.filter(t => favorites.has(t.magnet));
        if (query) {
            const words = query.split(/\s+/);
            filtered = filtered.filter(t => {
                const name = t.name.toLowerCase();
                return words.every(w => name.includes(w));
            });
        }
        // sort
        if (sortKey === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
        else if (sortKey === 'nameDesc') filtered.sort((a,b) => b.name.localeCompare(a.name));
        else if (sortKey === 'size') filtered.sort((a,b) => parseSize(normalizeSize(a.size)) - parseSize(normalizeSize(b.size)));
        else if (sortKey === 'sizeDesc') filtered.sort((a,b) => parseSize(normalizeSize(b.size)) - parseSize(normalizeSize(a.size)));
        else if (sortKey === 'platform') filtered.sort((a,b) => a.platform.localeCompare(b.platform));

        currentFiltered = filtered;
        totalSpan.textContent = filtered.length;
        uniqueCountSpan.textContent = torrents.length + " files in this system";
        favCountBadge.textContent = favorites.size;

        if (showFavoritesOnly) {
            favFilterBtn.classList.add('active');
            favFilterBtn.textContent = `⭐ Favorites (${favorites.size})`;
        } else {
            favFilterBtn.classList.remove('active');
            favFilterBtn.textContent = `⭐ Favorites ${favorites.size}`;
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-message">⚡ no torrents found</div>`;
            selectedIndex = -1;
            return;
        }

        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            const t = filtered[i];
            const hash = extractInfoHash(t.magnet);
            const isFav = favorites.has(t.magnet);
            const platformIcon = { pc:'💻', wii:'🎮', wiiu:'📺', xbox:'🟢', ps:'🔵' }[t.platform] || '💻';
            html += `
                <div class="torrent-item" data-index="${i}" data-magnet="${t.magnet.replace(/"/g,'&quot;')}">
                    <span class="torrent-name" title="${t.name}">${t.name}</span>
                    <span class="torrent-platform ${t.platform}">${platformIcon} ${t.platform}</span>
                    <span class="torrent-magnet">${t.magnet}</span>
                    <span class="torrent-size">${normalizeSize(t.size)}</span>
                    <span class="torrent-info-hash" data-fullhash="${hash}" title="Click to copy full hash (selectable)">${hash.slice(0,8)}…</span>
                    <button class="copy-btn" data-magnet="${t.magnet.replace(/"/g,'&quot;')}">📋 Copy</button>
                    <button class="fav-btn ${isFav?'favorited':''}" data-magnet="${t.magnet.replace(/"/g,'&quot;')}">${isFav?'★':'☆'}</button>
                </div>
            `;
        }
        container.innerHTML = html;

        // ---- Event: copy magnet ----
        container.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const magnet = btn.getAttribute('data-magnet');
                copyTextToClipboard(magnet, btn);
            });
        });

        // ---- Event: toggle favorite ----
        container.querySelectorAll('.fav-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const magnet = btn.getAttribute('data-magnet');
                toggleFavorite(magnet);
                render();
            });
        });

        // ---- Event: click on info-hash copies full hash & selects it ----
        container.querySelectorAll('.torrent-info-hash').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                const fullHash = this.getAttribute('data-fullhash');
                if (fullHash && fullHash !== 'N/A') {
                    copyTextToClipboard(fullHash, this);
                }
            });
        });

        // ---- Event: click on item copies magnet ----
        container.querySelectorAll('.torrent-item').forEach(item => {
            item.addEventListener('click', function(e) {
                if (e.target.classList.contains('copy-btn') || 
                    e.target.classList.contains('fav-btn') ||
                    e.target.classList.contains('torrent-info-hash')) return;
                const magnet = this.getAttribute('data-magnet');
                if (magnet) {
                    const btn = this.querySelector('.copy-btn');
                    if (btn) copyTextToClipboard(magnet, btn);
                }
            });
        });

        // keyboard highlight
        if (selectedIndex >= filtered.length) selectedIndex = filtered.length -1;
        if (selectedIndex === -1 && filtered.length) selectedIndex = 0;
        highlightSelected();
    }

    function highlightSelected() {
        document.querySelectorAll('.torrent-item.keyboard-selected').forEach(el => el.classList.remove('keyboard-selected'));
        const items = document.querySelectorAll('.torrent-item');
        if (selectedIndex >= 0 && selectedIndex < items.length) {
            items[selectedIndex].classList.add('keyboard-selected');
            items[selectedIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    function toggleFavorite(magnet) {
        if (favorites.has(magnet)) favorites.delete(magnet);
        else favorites.add(magnet);
    }

    // ----- EXPORT / IMPORT / BACKUP / RESTORE (now includes hash) -----
    function exportData() {
        // Build export data with full info hash for each torrent
        const exportTorrents = torrents.map(t => {
            const hash = extractInfoHash(t.magnet);
            return {
                name: t.name,
                magnet: t.magnet,
                size: t.size,
                platform: t.platform,
                infoHash: hash  // <-- added full hash
            };
        });
        const data = { 
            torrents: exportTorrents, 
            favorites: Array.from(favorites) 
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `torrentg_export_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(jsonStr) {
        try {
            const data = JSON.parse(jsonStr);
            if (data.torrents && Array.isArray(data.torrents)) {
                // Convert imported data back to internal format (discard infoHash, keep name/magnet/size/platform)
                const imported = data.torrents.map(t => ({
                    name: t.name || 'Unknown',
                    magnet: t.magnet || '',
                    size: t.size || 'unknown',
                    platform: t.platform || 'pc'
                }));
                // Only import if we have valid data
                if (imported.length > 0 && imported.every(t => t.magnet)) {
                    torrents = imported;
                    favorites = new Set(data.favorites || []);
                    render();
                    updateCounts();
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }

    function backupData() { exportData(); }
    function restoreData() {
        modalTitle.textContent = '♻️ Restore from JSON';
        modalTextarea.value = '';
        modal.classList.add('active');
        modalConfirmBtn.onclick = function() {
            const val = modalTextarea.value;
            if (importData(val)) {
                modal.classList.remove('active');
                alert('Restore successful!');
            } else {
                alert('Invalid backup data.');
            }
        };
    }

    function openImportModal() {
        modalTitle.textContent = '📥 Import JSON';
        modalTextarea.value = '';
        modal.classList.add('active');
        modalConfirmBtn.onclick = function() {
            const val = modalTextarea.value;
            if (importData(val)) {
                modal.classList.remove('active');
                alert('Import successful!');
            } else {
                alert('Invalid JSON data.');
            }
        };
    }

    // ----- PLATFORM COUNTS -----
    function updateCounts() {
        const counts = { all: torrents.length, pc:0, wii:0, wiiu:0, xbox:0, ps:0 };
        for (const t of torrents) { if (t.platform in counts) counts[t.platform]++; }
        document.getElementById('countAll').textContent = counts.all;
        document.getElementById('countPC').textContent = counts.pc;
        document.getElementById('countWii').textContent = counts.wii;
        document.getElementById('countWiiU').textContent = counts.wiiu;
        document.getElementById('countXbox').textContent = counts.xbox;
        document.getElementById('countPS').textContent = counts.ps;
    }

    // ----- NAVIGATION -----
    function navigate(direction) {
        const items = document.querySelectorAll('.torrent-item');
        const total = items.length;
        if (!total) return;
        if (direction === 'down') selectedIndex = (selectedIndex + 1) % total;
        else if (direction === 'up') selectedIndex = (selectedIndex - 1 + total) % total;
        highlightSelected();
    }

    function copySelected() {
        const items = document.querySelectorAll('.torrent-item');
        if (selectedIndex >= 0 && selectedIndex < items.length) {
            const magnet = items[selectedIndex].getAttribute('data-magnet');
            if (magnet) {
                const btn = items[selectedIndex].querySelector('.copy-btn');
                if (btn) copyTextToClipboard(magnet, btn);
            }
        }
    }

    function toggleFavSelected() {
        const items = document.querySelectorAll('.torrent-item');
        if (selectedIndex >= 0 && selectedIndex < items.length) {
            const magnet = items[selectedIndex].getAttribute('data-magnet');
            if (magnet) {
                toggleFavorite(magnet);
                render();
            }
        }
    }

    // ----- EVENT BINDING -----
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', openImportModal);
    document.getElementById('backupBtn').addEventListener('click', backupData);
    document.getElementById('restoreBtn').addEventListener('click', restoreData);

    favFilterBtn.addEventListener('click', function() {
        showFavoritesOnly = !showFavoritesOnly;
        selectedIndex = -1;
        render();
    });

    document.getElementById('sortSelect').addEventListener('change', function() {
        sortKey = this.value;
        render();
    });

    searchInput.addEventListener('input', () => { selectedIndex = -1; render(); });
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); copySelected(); }
        else if (e.key === 'ArrowDown') { e.preventDefault(); navigate('down'); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); navigate('up'); }
        else if (e.key === 'Escape') { e.preventDefault(); searchInput.value = ''; selectedIndex = -1; render(); searchInput.blur(); }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentPlatform = this.dataset.platform;
            selectedIndex = -1;
            render();
        });
    });

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowDown') { e.preventDefault(); navigate('down'); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); navigate('up'); }
        else if (e.key === 'Enter') { e.preventDefault(); copySelected(); }
        else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFavSelected(); }
        else if (e.key === '/') { e.preventDefault(); searchInput.focus(); searchInput.select(); }
        else if (e.key === 'Escape') { e.preventDefault(); selectedIndex = -1; highlightSelected(); searchInput.blur(); }
    });

    modalCloseBtn.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

    // ----- INIT -----
    updateCounts();
    render();
    if (torrents.length) { selectedIndex = 0; highlightSelected(); }
    console.log(`🏴‍☠️ TorrentG loaded · ${torrents.length} unique torrents · ${favorites.size} favorites`);
})();
</script>
</body>
</html>
