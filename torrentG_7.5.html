        }

            font-size: 0.75rem;

            color: #58a6ff;

            color: #6e7681;

        }

        .search-icon {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6e7681;
            font-size: 1.2rem;
            pointer-events: none;

        // ----- DEDUPLICATION: by name (case-insensitive) -----
        const nameMap = new Map();

        for (const [name, magnet, size] of rawData) {
            const nameLower = name.trim().toLowerCase();
            const existing = nameMap.get(nameLower);
            
            if (!existing) {
                nameMap.set(nameLower, {
                    name: name.trim(),
                    magnet: magnet.trim(),
                    size: size.trim(),
                    magnetLength: magnet.trim().length
                });
            } else {
                const currentMagnet = magnet.trim();
                if (currentMagnet.length > existing.magnetLength) {
                    nameMap.set(nameLower, {
                        name: name.trim(),
                        magnet: currentMagnet,
                        size: size.trim(),
                        magnetLength: currentMagnet.length
                    });
                }
            }
        }

        const uniqueTorrents = Array.from(nameMap.values()).map(item => ({
            name: item.name,
            magnet: item.magnet,
            size: item.size
        }));

        // ----- SMART SEARCH FUNCTION (Google-like) -----
        function smartSearch(query, list) {
            if (!query || query.trim() === '') {
                return list;
            }

            const q = query.toLowerCase().trim();
            
            // Split query into words for multi-term matching
            const words = q.split(/\s+/);
            
            // Score each item based on matches
            const scored = list.map(item => {
                const nameLower = item.name.toLowerCase();
                let score = 0;
                
                // Check each word
                for (const word of words) {
                    if (nameLower.includes(word)) {
                        // Boost score based on word position and length
                        const index = nameLower.indexOf(word);
                        const wordLength = word.length;
                        // Exact matches at start get higher score
                        const positionBonus = index === 0 ? 10 : 0;
                        // Longer words get more weight
                        const lengthBonus = wordLength * 0.5;
                        // Word boundary bonus (match as whole word)
                        const boundaryBonus = nameLower.includes(' ' + word) || nameLower.startsWith(word + ' ') ? 3 : 0;
                        score += 1 + positionBonus + lengthBonus + boundaryBonus;
                    }
                }
                
                // Bonus for matching the entire query as a substring
                if (nameLower.includes(q)) {
                    score += 5;
                }
                
                return { item, score };
            });
            
            // Filter out items with no matches
            const matched = scored.filter(s => s.score > 0);
            
            // Sort by score (highest first), then alphabetically
            matched.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.item.name.localeCompare(b.item.name);
            });
            
            return matched.map(s => s.item);
        }

        // ----- DOM References -----
        const container = document.getElementById('torrentContainer');
        const searchInput = document.getElementById('searchInput');
        const totalSpan = document.getElementById('totalCount');
        const uniqueCountSpan = document.getElementById('uniqueCount');
        const matchInfo = document.getElementById('matchInfo');
        const smartHint = document.getElementById('smartHint');

        let selectedIndex = -1;
        let currentFiltered = [];

        // ----- Render Function -----
        function render() {
            const query = searchInput.value;
            
            let filtered = smartSearch(query, uniqueTorrents);

            currentFiltered = filtered;
            totalSpan.textContent = filtered.length;
            uniqueCountSpan.textContent = `${uniqueTorrents.length} unique`;

            // Update search info
            if (query.trim()) {
                matchInfo.textContent = `🔍 Found ${filtered.length} matching torrents`;
                smartHint.textContent = `Smart matching: "${query}"`;
            } else {
                matchInfo.textContent = '💡 Smart matching';
                smartHint.textContent = 'Type to search';
            }

            if (filtered.length === 0) {
                let suggestions = '';
                if (query.trim()) {
                    suggestions = `<div class="suggestions">💡 Try: different keywords or check spelling</div>`;
                }
                container.innerHTML = `<div class="empty-message">⚡ no torrents found · try a different search${suggestions}</div>`;
                selectedIndex = -1;
                return;
            }

            let html = '';
            for (let i = 0; i < filtered.length; i++) {
                const t = filtered[i];
                const magnetAttr = escapeHtml(t.magnet);
                
                // Highlight matches in name
                let displayName = t.name;
                if (query.trim()) {
                    const q = query.toLowerCase().trim();
                    const nameLower = t.name.toLowerCase();
                    let highlighted = '';
                    let lastIndex = 0;
                    for (const word of q.split(/\s+/)) {
                        const index = nameLower.indexOf(word, lastIndex);
                        if (index !== -1) {
                            highlighted += t.name.substring(lastIndex, index);
                            highlighted += `<span class="match-highlight">${t.name.substring(index, index + word.length)}</span>`;
                            lastIndex = index + word.length;
                        }
                    }
                    if (lastIndex < t.name.length) {
                        highlighted += t.name.substring(lastIndex);
                    }
                    if (highlighted) {
                        displayName = highlighted;
                    }
                }
                
                html += `
                    <div class="torrent-item" data-index="${i}" data-magnet="${magnetAttr}">
                        <span class="torrent-name" title="${escapeHtml(t.name)}">${displayName}</span>
                        <span class="torrent-magnet" title="${escapeHtml(t.magnet)}">${escapeHtml(t.magnet)}</span>
                        <span class="torrent-size">${escapeHtml(t.size)}</span>
                        <button class="copy-btn" data-magnet="${magnetAttr}">📋 Copy</button>
                    </div>
                `;
            }
            container.innerHTML = html;

            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const magnet = this.getAttribute('data-magnet');
                    if (!magnet) return;
                    copyMagnet(magnet, this);
                });
            });

            // Reset selection if we have items
            if (filtered.length > 0) {
                if (selectedIndex >= filtered.length) {
                    selectedIndex = filtered.length - 1;
                }
                // If selectedIndex is -1, select first item
                if (selectedIndex === -1) {
                    selectedIndex = 0;
                }
            } else {
                selectedIndex = -1;
            }
            
            highlightSelected(filtered.length);
        }

        function highlightSelected(totalItems) {
            // Remove previous selection
            document.querySelectorAll('.torrent-item.keyboard-selected').forEach(el => {
                el.classList.remove('keyboard-selected');
            });
            
            if (selectedIndex < 0 || selectedIndex >= totalItems) {
                selectedIndex = -1;
                return;
            }
            
            const items = document.querySelectorAll('.torrent-item');
            if (items.length > 0 && selectedIndex < items.length) {
                const target = items[selectedIndex];
                target.classList.add('keyboard-selected');
                target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function copyMagnet(magnet, btnElement) {
            navigator.clipboard.writeText(magnet).then(() => {
                const original = btnElement.innerHTML;
                btnElement.innerHTML = '✅ Copied';
                btnElement.classList.add('copied');
                setTimeout(() => {
                    btnElement.innerHTML = original;
                    btnElement.classList.remove('copied');
                }, 2200);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = magnet;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const original = btnElement.innerHTML;
                btnElement.innerHTML = '✅ Copied';
                btnElement.classList.add('copied');
                setTimeout(() => {
                    btnElement.innerHTML = original;
                    btnElement.classList.remove('copied');
                }, 2200);
            });
        }

        function navigate(direction) {
            const visibleItems = document.querySelectorAll('.torrent-item');
            const total = visibleItems.length;
            
            if (total === 0) {
                selectedIndex = -1;
                return;
            }

            if (direction === 'down') {
                selectedIndex = (selectedIndex + 1) % total;
            } else if (direction === 'up') {
                selectedIndex = (selectedIndex - 1 + total) % total;
            }
            
            highlightSelected(total);
        }

        function copySelected() {
            if (selectedIndex === -1) return;
            const items = document.querySelectorAll('.torrent-item');
            if (selectedIndex >= items.length) return;
            const item = items[selectedIndex];
            const magnet = item.getAttribute('data-magnet');
            if (!magnet) return;
            const btn = item.querySelector('.copy-btn');
            if (btn) {
                copyMagnet(magnet, btn);
            }
        }

        // ----- Event Listeners -----
        searchInput.addEventListener('input', () => {
            selectedIndex = -1;
            render();
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                copySelected();
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                navigate('down');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                navigate('up');
            } else if (e.key === 'Escape') {
                e.preventDefault();
                searchInput.value = '';
                selectedIndex = -1;
                render();
                searchInput.blur();
            }
        });

        // Global keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            const isInputFocused = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');

            // Don't intercept if typing in input (except for Escape)
            if (isInputFocused && active.id === 'searchInput') {
                return;
            }

            if (isInputFocused) {
                return;
            }

            switch (e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    navigate('down');
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    navigate('up');
                    break;
                case 'Enter':
                    e.preventDefault();
                    copySelected();
                    break;
                case '/':
                    if (!e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        searchInput.focus();
                        searchInput.select();
                    }
                    break;
                case 'Escape':
                    e.preventDefault();
                    selectedIndex = -1;
                    highlightSelected(document.querySelectorAll('.torrent-item').length);
                    searchInput.blur();
                    break;
                default:
                    break;
            }
        });

        // Initial render
        render();
        // Select first item by default
        if (uniqueTorrents.length > 0) {
            selectedIndex = 0;
            highlightSelected(uniqueTorrents.length);
        }

        console.log(`🔍 TorrentG v3 ready · ${uniqueTorrents.length} unique torrents`);
        console.log('💡 Smart search: type anything, results sorted by relevance');
        console.log('⌨️ Arrow keys: navigate up/down, Enter: copy selected');
    })();
